<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>
:root{
--pink:#ff4d94;
--purple:#9b51e0;
--dark:#0f0a1e;
}

body{
margin:0;
background:var(--dark);
font-family:Segoe UI;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
text-align:center;
}

/* ---------------- CONTAINER ---------------- */
.container{
display:none;
flex-direction:column;
align-items:center;
animation:fade 1s ease;
}
.active{display:flex;}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* ---------------- COUNTDOWN ---------------- */
.countdown-circle{
width:150px;
height:150px;
border:8px solid var(--purple);
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:60px;
box-shadow:0 0 30px var(--purple);
margin-bottom:20px;
}

/* ---------------- BUTTON ---------------- */
button{
background:var(--pink);
color:white;
border:none;
padding:12px 25px;
border-radius:30px;
cursor:pointer;
margin-top:20px;
font-size:16px;
}

/* ---------------- CONFETTI ---------------- */
.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:fall linear infinite;
}
@keyframes fall{
to{transform:translateY(110vh) rotate(360deg);}
}

/* ---------------- CAKE ---------------- */
.cake-wrapper{
margin-top:40px;
animation:float 3s ease-in-out infinite;
}
@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}
.cake{
position:relative;
width:220px;
height:150px;
}
.layer1{
position:absolute;
bottom:0;
width:220px;
height:70px;
background:linear-gradient(to right,#8b4513,#a0522d);
border-radius:20px;
}
.layer2{
position:absolute;
bottom:60px;
width:220px;
height:40px;
background:#fff;
border-radius:20px;
}
.layer3{
position:absolute;
bottom:95px;
width:220px;
height:50px;
background:linear-gradient(to right,var(--pink),#ff85b3);
border-radius:50% 50% 20px 20px;
}
.candle{
position:absolute;
bottom:135px;
left:105px;
width:10px;
height:35px;
background:white;
border-radius:5px;
}
.flame{
position:absolute;
bottom:170px;
left:100px;
width:20px;
height:30px;
background:radial-gradient(circle,#ffcc00 40%,orange 70%);
border-radius:50%;
opacity:0;
animation:flicker 0.2s infinite alternate;
box-shadow:0 0 20px orange,0 0 40px #ffcc00;
}
@keyframes flicker{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

/* ---------------- BALLOONS ---------------- */
.balloon-container{
display:flex;
gap:25px;
margin-top:30px;
flex-wrap:wrap;
justify-content:center;
}
.balloon{
width:130px;
height:170px;
background:var(--pink);
border-radius:50% 50% 45% 45%;
position:relative;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
padding:15px;
font-weight:bold;
transition:0.4s ease;
}
.balloon:after{
content:"";
position:absolute;
bottom:-25px;
left:50%;
width:2px;
height:45px;
background:white;
transform:translateX(-50%);
}
.balloon-message{
display:none;
color:white;
font-size:20px;
animation:fadeInMsg 0.6s ease forwards;
}
.balloon.pop{
background:transparent;
}
.balloon.pop:after{
display:none;
}
@keyframes fadeInMsg{
from{opacity:0; transform:scale(0.8);}
to{opacity:1; transform:scale(1);}
}

/* ---------------- PHOTO STACK ---------------- */
.photo-stack{
position:relative;
width:480px;
height:650px;
margin-top:20px;
}

.photo-stack img{
position:absolute;
width:350px;
height:580px;
object-fit:cover;
border-radius:15px;
cursor:pointer;
box-shadow:0 15px 30px rgba(0,0,0,0.6);
transition:transform 0.6s ease;
}

/* Slight natural rotation */
.photo-stack img:nth-child(1){
top:0; left:0; transform:rotate(-8deg);
}
.photo-stack img:nth-child(2){
top:20px; left:20px; transform:rotate(6deg);
}
.photo-stack img:nth-child(3){
top:40px; left:40px; transform:rotate(-5deg);
}
.photo-stack img:nth-child(4){
top:60px; left:60px; transform:rotate(8deg);
}
</style>
</head>

<body>

<!-- STAGE 1 -->
<div id="stage1" class="container active">
<div class="countdown-circle" id="timer">3</div>
<h2>Crafting your special moment...</h2>
</div>

<!-- STAGE 2 -->
<div id="stage2" class="container">
<h2 style="font-size:80px;">Happy Birthday 💖</h2>
<button onclick="nextStage(3)">Start</button>
</div>

<!-- STAGE 3 -->
<div id="stage3" class="container">
<div class="cake-wrapper">
<div class="cake">
<div class="layer1"></div>
<div class="layer2"></div>
<div class="layer3"></div>
<div class="candle"></div>
<div class="flame" id="flame"></div>
</div>
</div>
<button onclick="lightCandle()">Light the Candle</button>
</div>

<!-- STAGE 4 BALLOONS -->
<div id="stage4" class="container">
<h2>Pop the Balloons 🎈</h2>
<div class="balloon-container">
<div class="balloon" onclick="burstBalloon(this)">
<span class="balloon-message">Always with You 💕</span>
</div>
<div class="balloon" onclick="burstBalloon(this)">
<span class="balloon-message">My Dream Girl 🌸</span>
</div>
<div class="balloon" onclick="burstBalloon(this)">
<span class="balloon-message">Keep smiling 😊</span>
</div>
<div class="balloon" onclick="burstBalloon(this)">
<span class="balloon-message">My daily happiness 💖</span>
</div>
</div>
<button onclick="nextStage(5)">See Memories</button>
</div>

<!-- STAGE 5 PHOTOS -->
<div id="stage5" class="container">
<h2>Memories 💕</h2>
<div class="photo-stack" id="stack">
<img src="C:\Users\Jagason J\Desktop\joni\file.jpeg" onclick="sendBack(this)">
<img src="C:\Users\Jagason J\Desktop\joni\file1.jpeg" onclick="sendBack(this)">
<img src="C:\Users\Jagason J\Desktop\joni\file2.jpeg" onclick="sendBack(this)">
<img src="C:\Users\Jagason J\Desktop\joni\file3.jpeg" onclick="sendBack(this)">
</div>
<button onclick="location.reload()">Replay</button>
</div>

<script>

function nextStage(n){
document.querySelectorAll(".container").forEach(c=>c.classList.remove("active"));
document.getElementById("stage"+n).classList.add("active");
}

/* COUNTDOWN */
let count=3;
let interval=setInterval(()=>{
document.getElementById("timer").innerText=count;
count--;
if(count<0){
clearInterval(interval);
nextStage(2);
}
},1000);

/* CANDLE */
function lightCandle(){
document.getElementById("flame").style.opacity="1";
setTimeout(()=>nextStage(4),2000);
}

/* BALLOON */
function burstBalloon(balloon){
balloon.classList.add("pop");
balloon.querySelector(".balloon-message").style.display="block";
}

/* CONFETTI */
function createConfetti(){
for(let i=0;i<80;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
c.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(c);
}
}
createConfetti();

/* PHOTO STACK FIXED */
const stack=document.getElementById("stack");

function sendBack(photo){

photo.style.transform += " rotate(20deg) scale(1.08)";

setTimeout(()=>{
stack.appendChild(photo);

const updatedPhotos = Array.from(stack.children);
updatedPhotos.forEach((img, index)=>{
img.style.zIndex = updatedPhotos.length - index;
});

photo.style.transform="";
},500);

}

</script>

</body>
</html>
